source:
  name: fastapi
  docs_url: https://fastapi.tiangolo.com
  version: "0.115.0"
  content_hash: sha256:test123

rules:
  - id: fastapi.async-routes
    severity: must
    confidence: high
    category: convention
    description: >
      Route handlers MUST use async def.
    source_url: https://fastapi.tiangolo.com/async/
    approved: true
    approved_at: 2026-02-25T12:00:00Z
    signals:
      - id: is-sync-function
        strategy: ast
        description: Function decorated with route decorator uses def instead of async def
        weight: required
    golden_examples:
      - code: |
          @app.get("/users")
          async def get_users(): ...
        verdict: pass
      - code: |
          @app.get("/users")
          def get_users(): ...
        verdict: fail
