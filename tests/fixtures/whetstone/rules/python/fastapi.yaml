source:
  name: fastapi
  docs_url: https://fastapi.tiangolo.com
  version: "0.115.0"
  content_hash: sha256:test123
  resolved_at: "2026-02-25T11:00:00Z"
  registry: pypi

rules:
  - id: fastapi.async-routes
    severity: must
    confidence: high
    category: convention
    description: >
      Route handlers MUST use async def.
    source_url: https://fastapi.tiangolo.com/async/
    source_quote: >
      Use async def for route operations that call async libraries.
    risk: >
      Blocks the event loop under concurrent load, causing request timeouts.
    linter_gap: >
      ruff has no rule for async vs sync route handlers.
    status: approved
    approved: true
    approved_at: "2026-02-25T12:00:00Z"
    proposed_at: "2026-02-25T11:30:00Z"
    proposed_by: whetstone-extraction
    signals:
      - id: is-sync-function
        strategy: ast
        description: Function decorated with route decorator uses def instead of async def
        weight: required
    golden_examples:
      - code: |
          @app.get("/users")
          async def get_users(): ...
        verdict: pass
        reason: Uses async def as recommended by FastAPI docs
      - code: |
          @app.get("/users")
          def get_users(): ...
        verdict: fail
        reason: Sync function blocks the event loop under concurrent load
      - code: |
          @app.post("/items")
          async def create_item(item: Item): ...
        verdict: pass
        reason: POST handler correctly uses async def
