  registry: crates_io
  content_origin: readme

rules:
  - id: clap.derive-over-builder
    severity: should
    confidence: high
    category: convention
    description: >
      SHOULD use the derive API (#[derive(Parser)]) instead of the builder API
      (Command::new()) for new CLI definitions. The derive API is more concise,
      type-safe, and the recommended approach in clap 4.x docs.
    source_url: "https://docs.rs/clap/latest/clap/_derive/index.html"
    approved: true
    status: approved
    signals:
      - id: builder-api-usage
        strategy: pattern
        description: "Detects Command::new() or App::new() (legacy) in clap argument definitions"
        match: '(Command|App)::new\s*\('
        weight: required

    golden_examples:
      - code: |
          #[derive(Parser)]
          struct Cli {
              #[arg(short, long)]
              verbose: bool,
          }
        verdict: pass
        reason: "Uses derive API — type-safe, concise"
      - code: |
          let matches = Command::new("myapp")
              .arg(Arg::new("verbose").short('v').long("verbose"))
              .get_matches();
        verdict: fail
        reason: "Uses builder API — stringly-typed, verbose"
      - code: |
          #[derive(Parser)]
          #[command(name = "myapp", version, about)]
          struct Cli {
              #[command(subcommand)]
              command: Commands,
          }
        verdict: pass
        reason: "Derive API with subcommands — clean and type-safe"
