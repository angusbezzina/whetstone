name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-13
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-14
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (aarch64-linux)
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build binary
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/whetstone whetstone-${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: whetstone-${{ matrix.target }}
          path: whetstone-${{ matrix.target }}

  validate-binary:
    name: Validate binary
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download x86_64-linux artifact
        uses: actions/download-artifact@v4
        with:
          name: whetstone-x86_64-unknown-linux-gnu

      - name: Make executable
        run: chmod +x whetstone-x86_64-unknown-linux-gnu

      - name: Validate --version
        run: ./whetstone-x86_64-unknown-linux-gnu --version

      - name: Validate detect-deps
        run: |
          ./whetstone-x86_64-unknown-linux-gnu detect-deps --project-dir tests/fixtures | jq .

      - name: Validate status
        run: |
          ./whetstone-x86_64-unknown-linux-gnu status --json --no-snapshot --project-dir tests/fixtures | jq .

      - name: Validate ci-check
        run: |
          ./whetstone-x86_64-unknown-linux-gnu ci-check --json --project-dir tests/fixtures | jq .

  release:
    name: Create Release
    needs: [build, validate-binary]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/whetstone-*/; do
            cp "${dir}"whetstone-* release/
          done

      - name: Generate checksums
        working-directory: release
        run: |
          sha256sum whetstone-* > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/whetstone-*
            release/checksums-sha256.txt
