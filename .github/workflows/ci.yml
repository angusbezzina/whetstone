# Whetstone CI — builds, tests, and validates on every push/PR
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Build
        run: cargo build

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run Rust tests
        run: cargo test

  # Python jobs below exist solely to lint and parity-test the archived
  # reference implementations under scripts/legacy/. No user-facing Whetstone
  # functionality depends on a Python runtime — the binary is Rust-only.
  # Schema validation, install smoke tests, and action.yml validation all
  # run without setup-python in the schema-check / install-smoke / actionlint
  # jobs above.
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check scripts/ tests/ --select E,F,W,I --ignore E501

      - name: Run ruff format check
        run: ruff format --check scripts/ tests/

  python-parity-tests:
    runs-on: ubuntu-latest
    needs: python-lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml pytest

      - name: Run parity contract tests against scripts/legacy/
        run: python3 -m pytest tests/test_script_contracts.py -v

  schema-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build release binary for validation steps
        run: cargo build --release

      - name: Validate rule schema fields
        run: ./target/release/whetstone validate

      - name: Validate action.yml outputs match ci-check fields
        shell: bash
        run: |
          set -euo pipefail

          # Extract `outputs:` top-level keys from action.yml without needing Python.
          ACTION_OUTPUTS=$(
            awk '
              /^outputs:/        { in_outputs = 1; next }
              /^[^[:space:]]/    { in_outputs = 0 }
              in_outputs && /^  [A-Za-z_][A-Za-z0-9_]*:/ {
                gsub(":", "", $1); print $1
              }
            ' action.yml
          )
          echo "Action outputs: $(echo "$ACTION_OUTPUTS" | tr '\n' ' ')"

          CI_JSON=$(./target/release/whetstone ci \
            --project-dir tests/fixtures --json --no-drift-check)

          for field in $ACTION_OUTPUTS; do
            if ! echo "$CI_JSON" | jq -e --arg k "$field" '. | has($k)' >/dev/null; then
              echo "FAIL: action output \"$field\" not in ci-check JSON"
              exit 1
            fi
            value=$(echo "$CI_JSON" | jq -r --arg k "$field" '.[$k]')
            echo "  OK: $field = $value"
          done

          echo "All action outputs verified."

  release-binary-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Validate all commands produce valid JSON
        run: |
          BIN=./target/release/whetstone

          # detect-deps
          $BIN init --project-dir tests/fixtures | jq -e '.dependencies | length > 0'

          # status --json
          $BIN status --json --no-snapshot --no-drift-check --project-dir tests/fixtures | jq -e '.status and .score != null and .label and .dimensions'

          # ci-check --json
          $BIN ci --json --project-dir tests/fixtures | jq -e '.freshness_status and .score != null and .requires_review != null and .changed_sources_count != null and .recommended_rules_count != null'

          # ci-check --pr-comment
          COMMENT=$($BIN ci --pr-comment --project-dir tests/fixtures --no-drift-check)
          echo "$COMMENT" | grep -q "<!-- whetstone-ci-check -->"
          echo "$COMMENT" | grep -q "Whetstone Status"

          # generate-context --dry-run --json
          $BIN context --dry-run --json --project-dir tests/fixtures | jq -e '.status == "ok"'

          # generate-tests --dry-run --json
          $BIN tests --dry-run --json --project-dir tests/fixtures | jq -e '.status == "ok"'

          # --version and --help
          $BIN --version | grep -q "whetstone"
          $BIN --help | grep -q "ci"

      - name: Validate installed-binary style usage from outside repo root
        run: |
          BIN="$(pwd)/target/release/whetstone"
          TMPDIR=$(mktemp -d)
          cd "$TMPDIR"
          "$BIN" status --json --no-snapshot --no-drift-check --project-dir "$GITHUB_WORKSPACE/tests/fixtures" | jq -e '.status == "ok"'

      - name: Validate ci-check output contract matches action.yml outputs
        run: |
          BIN=./target/release/whetstone
          OUTPUT=$($BIN ci --json --project-dir tests/fixtures)

          for field in freshness_status changed_sources_count recommended_rules_count requires_review score; do
            echo "$OUTPUT" | jq -e ".$field != null" || { echo "FAIL: missing $field"; exit 1; }
            echo "OK: $field"
          done

  install-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Install via install.sh against the local binary
        shell: bash
        run: |
          set -euo pipefail
          INSTALL_ROOT=$(mktemp -d)
          export INSTALL_DIR="${INSTALL_ROOT}/bin"
          export WHETSTONE_INSTALL_LOCAL_SRC="$(pwd)/target/release/whetstone"
          ./install.sh
          test -x "${INSTALL_DIR}/whetstone" || {
            echo "FAIL: install.sh did not place an executable at ${INSTALL_DIR}/whetstone"
            exit 1
          }
          echo "INSTALL_DIR=${INSTALL_DIR}" >> "$GITHUB_ENV"

      - name: Run installed binary from outside the repo checkout
        shell: bash
        run: |
          set -euo pipefail
          FIXTURES="$GITHUB_WORKSPACE/tests/fixtures"
          OUTSIDE=$(mktemp -d)
          cd "$OUTSIDE"

          # --version and --help must work from an install dir.
          "${INSTALL_DIR}/whetstone" --version | grep -q "whetstone"
          "${INSTALL_DIR}/whetstone" --help | grep -q "ci"

          # Core JSON commands against an external project dir.
          "${INSTALL_DIR}/whetstone" status \
            --json --no-snapshot --no-drift-check --project-dir "$FIXTURES" \
            | jq -e '.status == "ok"'

          "${INSTALL_DIR}/whetstone" init --project-dir "$FIXTURES" \
            | jq -e '.dependencies | length > 0'

          "${INSTALL_DIR}/whetstone" ci \
            --json --no-drift-check --project-dir "$FIXTURES" \
            | jq -e '.freshness_status'

          "${INSTALL_DIR}/whetstone" validate \
            --project-dir "$GITHUB_WORKSPACE" | grep -q "All schema checks passed."

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate action.yml is well-formed
        shell: bash
        run: |
          set -euo pipefail

          # Structural checks against action.yml using only grep/awk so this
          # job has no language-runtime dependency. The action.yml schema is
          # stable enough that column-anchored top-level keys are reliable.
          fail() { echo "FAIL: $1"; exit 1; }

          for key in name description inputs outputs runs; do
            if ! grep -Eq "^${key}:" action.yml; then
              fail "action.yml missing top-level key: ${key}"
            fi
          done

          if ! grep -Eq '^[[:space:]]+using:[[:space:]]+"?composite"?' action.yml; then
            fail "action.yml must use composite runs"
          fi

          if ! grep -Eq '^[[:space:]]+steps:' action.yml; then
            fail "action.yml has no steps block"
          fi

          # Count children of `inputs:`, `outputs:`, and `runs.steps:` by
          # looking at two-space-indented keys / dashes between section markers.
          count_children() {
            awk -v section="$1" '
              $0 ~ "^"section":" { in_section = 1; next }
              in_section && /^[^[:space:]]/ { in_section = 0 }
              in_section && /^  [A-Za-z_][A-Za-z0-9_-]*:/ { n++ }
              END { print n + 0 }
            ' action.yml
          }
          count_steps() {
            awk '
              /^  steps:/ { in_steps = 1; next }
              in_steps && /^[^[:space:]]/ { in_steps = 0 }
              in_steps && /^    - / { n++ }
              END { print n + 0 }
            ' action.yml
          }

          inputs=$(count_children inputs)
          outputs=$(count_children outputs)
          steps=$(count_steps)

          [ "$steps" -gt 0 ] || fail "action.yml has no steps"

          echo "action.yml OK: $inputs inputs, $outputs outputs, $steps steps"
