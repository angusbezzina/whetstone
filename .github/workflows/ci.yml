# Whetstone CI — builds, tests, and validates on every push/PR
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Build
        run: cargo build

      - name: Run clippy
        run: cargo clippy -- -D warnings -A dead_code

      - name: Run Rust tests
        run: cargo test --test rust_integration

  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check scripts/ tests/ --select E,F,W,I --ignore E501

      - name: Run ruff format check
        run: ruff format --check scripts/ tests/

  python-test:
    runs-on: ubuntu-latest
    needs: python-lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml pytest

      - name: Run contract tests
        run: python3 -m pytest tests/test_script_contracts.py -v

  schema-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate rule schema fields
        run: |
          python3 -c "
          import yaml, sys, pathlib

          VALID_SEVERITIES = {'must', 'should', 'may'}
          VALID_CONFIDENCES = {'high', 'medium'}
          VALID_CATEGORIES = {'migration', 'default', 'convention', 'breaking-change', 'semantic'}
          VALID_STRATEGIES = {'ast', 'pattern', 'lint_proxy', 'ai'}

          schema_path = pathlib.Path('references/rule-schema.yaml')
          if not schema_path.exists():
              print('FAIL: references/rule-schema.yaml not found')
              sys.exit(1)

          text = schema_path.read_text()
          print('Schema file found and readable.')

          # Verify required field names are documented
          required_fields = ['id', 'severity', 'confidence', 'category', 'description', 'source_url', 'signals']
          for field in required_fields:
              if field not in text:
                  print(f'FAIL: required field \"{field}\" not found in schema')
                  sys.exit(1)
              print(f'  OK: {field}')

          # Verify fixture rules parse AND validate against strict schema
          fixtures = list(pathlib.Path('tests/fixtures').rglob('*.yaml'))
          print(f'Checking {len(fixtures)} fixture files...')
          errors = []
          for f in fixtures:
              try:
                  data = yaml.safe_load(f.read_text())
                  if data and 'rules' in data:
                      for rule in data['rules']:
                          rid = rule.get('id', '?')
                          # Required fields
                          for req in ('id', 'severity', 'confidence'):
                              if req not in rule:
                                  errors.append(f'{f}: rule {rid} missing {req}')
                          # Enum validation
                          sev = rule.get('severity')
                          if sev and sev not in VALID_SEVERITIES:
                              errors.append(f'{f}: rule {rid} invalid severity \"{sev}\"')
                          conf = rule.get('confidence')
                          if conf and conf not in VALID_CONFIDENCES:
                              errors.append(f'{f}: rule {rid} invalid confidence \"{conf}\"')
                          cat = rule.get('category')
                          if cat and cat not in VALID_CATEGORIES:
                              errors.append(f'{f}: rule {rid} invalid category \"{cat}\"')
                          # Signal strategy validation
                          for sig in rule.get('signals', []):
                              if isinstance(sig, dict):
                                  strat = sig.get('strategy')
                                  if strat and strat not in VALID_STRATEGIES:
                                      errors.append(f'{f}: rule {rid} invalid strategy \"{strat}\"')
                          print(f'  OK: {f} / {rid}')
              except Exception as e:
                  errors.append(f'{f}: parse error: {e}')

          if errors:
              for e in errors:
                  print(f'FAIL: {e}')
              sys.exit(1)

          print('All schema checks passed.')
          "

      - name: Validate action.yml outputs match ci-check fields
        run: |
          python3 -c "
          import yaml, json, subprocess, sys

          # Load action.yml outputs
          with open('action.yml') as f:
              action = yaml.safe_load(f)
          action_outputs = set(action.get('outputs', {}).keys())
          print(f'Action outputs: {action_outputs}')

          # Run ci-check to get actual JSON fields
          result = subprocess.run(
              [sys.executable, 'scripts/ci-check.py', '--project-dir', 'tests/fixtures', '--json', '--no-drift-check'],
              capture_output=True, text=True, timeout=60
          )
          ci_data = json.loads(result.stdout)

          # Every action output must exist in ci-check JSON
          for output_name in action_outputs:
              if output_name not in ci_data:
                  print(f'FAIL: action output \"{output_name}\" not in ci-check JSON')
                  sys.exit(1)
              print(f'  OK: {output_name} = {ci_data[output_name]}')

          print('All action outputs verified.')
          "

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate action.yml is well-formed
        run: |
          python3 -c "
          import yaml, sys

          with open('action.yml') as f:
              action = yaml.safe_load(f)

          required = ['name', 'description', 'inputs', 'outputs', 'runs']
          missing = [k for k in required if k not in action]
          if missing:
              print(f'FAIL: action.yml missing top-level keys: {missing}')
              sys.exit(1)

          if action.get('runs', {}).get('using') != 'composite':
              print('FAIL: action.yml must use composite runs')
              sys.exit(1)

          steps = action.get('runs', {}).get('steps', [])
          if not steps:
              print('FAIL: action.yml has no steps')
              sys.exit(1)

          print(f'action.yml OK: {len(action.get(\"inputs\", {}))} inputs, {len(action.get(\"outputs\", {}))} outputs, {len(steps)} steps')
          "
