# Whetstone CI — builds, tests, and validates on every push/PR
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Build
        run: cargo build

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run Rust tests
        run: cargo test

  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check scripts/ tests/ --select E,F,W,I --ignore E501

      - name: Run ruff format check
        run: ruff format --check scripts/ tests/

  python-test:
    runs-on: ubuntu-latest
    needs: python-lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml pytest

      - name: Run contract tests
        run: python3 -m pytest tests/test_script_contracts.py -v

  schema-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate rule schema fields
        run: python3 scripts/validate-rule-schema.py

      - name: Validate action.yml outputs match ci-check fields
        run: |
          python3 -c "
          import yaml, json, subprocess, sys

          # Load action.yml outputs
          with open('action.yml') as f:
              action = yaml.safe_load(f)
          action_outputs = set(action.get('outputs', {}).keys())
          print(f'Action outputs: {action_outputs}')

          # Run ci-check to get actual JSON fields
          result = subprocess.run(
              ['./target/release/whetstone', 'ci-check', '--project-dir', 'tests/fixtures', '--json', '--no-drift-check'],
              capture_output=True, text=True, timeout=60
          )
          ci_data = json.loads(result.stdout)

          # Every action output must exist in ci-check JSON
          for output_name in action_outputs:
              if output_name not in ci_data:
                  print(f'FAIL: action output \"{output_name}\" not in ci-check JSON')
                  sys.exit(1)
              print(f'  OK: {output_name} = {ci_data[output_name]}')

          print('All action outputs verified.')
          "

  release-binary-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Validate all commands produce valid JSON
        run: |
          BIN=./target/release/whetstone

          # detect-deps
          $BIN detect-deps --project-dir tests/fixtures | jq -e '.dependencies | length > 0'

          # status --json
          $BIN status --json --no-snapshot --no-drift-check --project-dir tests/fixtures | jq -e '.status and .score != null and .label and .dimensions'

          # ci-check --json
          $BIN ci-check --json --project-dir tests/fixtures | jq -e '.freshness_status and .score != null and .requires_review != null and .changed_sources_count != null and .recommended_rules_count != null'

          # ci-check --pr-comment
          COMMENT=$($BIN ci-check --pr-comment --project-dir tests/fixtures --no-drift-check)
          echo "$COMMENT" | grep -q "<!-- whetstone-ci-check -->"
          echo "$COMMENT" | grep -q "Whetstone Status"

          # generate-context --dry-run --json
          $BIN generate-context --dry-run --json --project-dir tests/fixtures | jq -e '.status == "ok"'

          # generate-tests --dry-run --json
          $BIN generate-tests --dry-run --json --project-dir tests/fixtures | jq -e '.status == "ok"'

          # --version and --help
          $BIN --version | grep -q "whetstone"
          $BIN --help | grep -q "ci-check"

      - name: Validate installed-binary style usage from outside repo root
        run: |
          BIN="$(pwd)/target/release/whetstone"
          TMPDIR=$(mktemp -d)
          cd "$TMPDIR"
          "$BIN" status --json --no-snapshot --no-drift-check --project-dir "$GITHUB_WORKSPACE/tests/fixtures" | jq -e '.status == "ok"'

      - name: Validate ci-check output contract matches action.yml outputs
        run: |
          BIN=./target/release/whetstone
          OUTPUT=$($BIN ci-check --json --project-dir tests/fixtures)

          for field in freshness_status changed_sources_count recommended_rules_count requires_review score; do
            echo "$OUTPUT" | jq -e ".$field != null" || { echo "FAIL: missing $field"; exit 1; }
            echo "OK: $field"
          done

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate action.yml is well-formed
        run: |
          python3 -c "
          import yaml, sys

          with open('action.yml') as f:
              action = yaml.safe_load(f)

          required = ['name', 'description', 'inputs', 'outputs', 'runs']
          missing = [k for k in required if k not in action]
          if missing:
              print(f'FAIL: action.yml missing top-level keys: {missing}')
              sys.exit(1)

          if action.get('runs', {}).get('using') != 'composite':
              print('FAIL: action.yml must use composite runs')
              sys.exit(1)

          steps = action.get('runs', {}).get('steps', [])
          if not steps:
              print('FAIL: action.yml has no steps')
              sys.exit(1)

          print(f'action.yml OK: {len(action.get(\"inputs\", {}))} inputs, {len(action.get(\"outputs\", {}))} outputs, {len(steps)} steps')
          "
