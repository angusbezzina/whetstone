source:
  name: "whetstone:recommended/typescript"
  docs_url: "https://www.typescriptlang.org/docs/"
  version: "1.0.0"
  content_hash: "sha256:builtin-typescript-v1"
  resolved_at: "2026-04-13T00:00:00Z"
  registry: manual
  content_origin: manual

rules:
  - id: typescript.no-any
    severity: should
    confidence: high
    category: convention
    source_kind: official_docs
    description: >
      SHOULD NOT use `any` as an explicit type annotation. `any` turns off
      type checking locally and the escape hatch leaks through the rest of
      the codebase. Prefer `unknown` when a value is truly unknown, or a
      specific type.
    source_url: "https://www.typescriptlang.org/docs/handbook/2/everyday-types.html#any"
    risk: >
      Silent type errors propagate out of `any`-typed values. Refactors that
      would normally be caught at compile time become runtime crashes.
    linter_gap: >
      typescript-eslint's `no-explicit-any` rule covers this but is not in
      biome's recommended ruleset out of the box.
    approved: true
    status: approved
    proposed_at: "2026-04-13T00:00:00Z"
    proposed_by: whetstone-builtin
    signals:
      - id: explicit-any-annotation
        strategy: pattern
        description: "variable or parameter annotated as `: any`"
        match: ':\s*any(\b|\[)'
        ast_scope: type_annotation
        weight: required
    golden_examples:
      - code: |
          function parse(input: unknown): ParsedPayload {
            if (typeof input !== "object" || input === null) throw new Error("bad");
            return input as ParsedPayload;
          }
        verdict: pass
        reason: "Uses `unknown` — forces type narrowing before use"
      - code: |
          function parse(input: any): ParsedPayload {
            return input as ParsedPayload;
          }
        verdict: fail
        reason: "`any` turns off type checking on `input`"
      - code: |
          const cache: Record<string, any> = {};
        verdict: fail
        reason: "`any` in a generic parameter erases value types"

  - id: typescript.no-ts-ignore
    severity: should
    confidence: high
    category: convention
    source_kind: official_docs
    description: >
      SHOULD use `@ts-expect-error` instead of `@ts-ignore` when suppressing
      a type error. `@ts-expect-error` fails when the underlying error has
      been fixed, so suppressions self-cleanup; `@ts-ignore` silently
      continues to pass even after the problem is resolved.
    source_url: "https://www.typescriptlang.org/docs/handbook/release-notes/typescript-3-9.html#ts-expect-error-comments"
    risk: >
      Stale `@ts-ignore` comments hide regressions long after the underlying
      type mismatch has been fixed or, worse, re-introduced.
    linter_gap: >
      typescript-eslint has `prefer-ts-expect-error`; biome's equivalent is
      `useTsExpectError` but is currently in biome's nursery bucket.
    approved: true
    status: approved
    proposed_at: "2026-04-13T00:00:00Z"
    proposed_by: whetstone-builtin
    signals:
      - id: ts-ignore-comment
        strategy: pattern
        description: "// @ts-ignore comment"
        match: '//\s*@ts-ignore\b'
        weight: required
    golden_examples:
      - code: |
          // @ts-expect-error: upstream type is wrong, PR pending
          api.doSomething(42);
        verdict: pass
        reason: "expect-error surfaces if the upstream type is fixed"
      - code: |
          // @ts-ignore
          api.doSomething(42);
        verdict: fail
        reason: "ts-ignore never fails — stale suppressions linger forever"

  - id: typescript.no-var
    severity: must
    confidence: high
    category: breaking-change
    source_kind: official_docs
    description: >
      MUST NOT declare variables with `var`. Function-scoped hoisting causes
      surprising behaviour and closures. Use `const` by default and `let`
      only when reassignment is required.
    source_url: "https://www.typescriptlang.org/docs/handbook/variable-declarations.html"
    risk: >
      Var hoisting silently shadows block-scoped variables, creating bugs
      that are hard to spot in code review.
    linter_gap: >
      typescript-eslint's `no-var` is recommended; biome's `noVar` is on by
      default, but teams without biome may still miss it.
    approved: true
    status: approved
    proposed_at: "2026-04-13T00:00:00Z"
    proposed_by: whetstone-builtin
    signals:
      - id: var-declaration
        strategy: ast
        description: "`var` variable declaration"
        match: '(^|\s)var\s+\w+'
        ast_query: |
          (variable_declaration) @match
        weight: required
    golden_examples:
      - code: |
          const total = items.reduce((acc, n) => acc + n, 0);
        verdict: pass
        reason: "Block-scoped const"
      - code: |
          let counter = 0;
          counter += 1;
        verdict: pass
        reason: "let with reassignment"
      - code: |
          var counter = 0;
          counter += 1;
        verdict: fail
        reason: "function-scoped var"

  - id: typescript.no-non-null-assertion
    severity: should
    confidence: high
    category: convention
    source_kind: official_docs
    description: >
      SHOULD avoid the non-null assertion operator `!` on property access or
      function return values. It overrides the compiler's narrowing without
      any evidence the value is non-null; a narrow check or optional
      chaining is safer.
    source_url: "https://www.typescriptlang.org/docs/handbook/2/everyday-types.html#non-null-assertion-operator-postfix-"
    risk: >
      Hides nullable bugs. The `!` compiles clean but throws at runtime when
      the asserted value is actually null/undefined.
    linter_gap: >
      typescript-eslint's `no-non-null-assertion` covers this but is not in
      biome's default recommended set.
    approved: true
    status: approved
    proposed_at: "2026-04-13T00:00:00Z"
    proposed_by: whetstone-builtin
    signals:
      - id: non-null-assertion
        strategy: ast
        description: "postfix non-null assertion operator (`!`)"
        match: '\w+!\.'
        ast_query: |
          (non_null_expression) @match
        weight: required
    golden_examples:
      - code: |
          const name = user?.profile?.displayName ?? "anon";
        verdict: pass
        reason: "Optional chaining instead of assertion"
      - code: |
          const name = user.profile!.displayName;
        verdict: fail
        reason: "Non-null assertion on profile — throws if profile is undefined"

  # typescript.prefer-const intentionally omitted from the built-in baseline:
  # correctly distinguishing "let that is never reassigned" from "let with
  # reassignment" requires scope analysis that a single-line regex cannot
  # express. Biome's `useConst` is recommended-by-default and covers this
  # case natively; ESLint-only setups should enable `prefer-const` directly.
